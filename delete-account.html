<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="favicon.ico">
    <link href="styles/output.css" rel="stylesheet" />
    <link href="styles/styles.css" rel="stylesheet" />
    <title>Delete Account - Spotip</title>
</head>

<body class="flex justify-center items-center bg-[#fafafa]">
    <div class="max-w-[1440px] md:min-w-[1440px] py-[40px]">

        <section class="mt-20">
            <h1 class="text-5xl font-bold text-center">Delete Account</h1>
            <p class="text-center mt-4 text-gray-700">Please fill out the form below to request account deletion.</p>
            <form class="mt-10 max-w-lg mx-auto bg-white p-8 rounded-lg shadow-md" onsubmit="handleSubmit(event)">
                <div class="mb-6">
                    <label for="email" class="block text-gray-700 font-bold mb-2">Email Address</label>
                    <input type="email" id="email" name="email" class="w-full px-3 py-2 border rounded-lg" required>
                </div>
                <div class="mb-6">
                    <label for="reason" class="block text-gray-700 font-bold mb-2">Reason for Deletion</label>
                    <select id="reason" name="reason" class="w-full px-3 py-2 border rounded-lg" required onchange="toggleCustomReason()">
            <option value="" disabled selected>Select Reason</option>
            <option value="privacy">Privacy Concerns</option>
            <option value="not-useful">Not Useful</option>
            <option value="too-expensive">Too Expensive</option>
            <option value="poor-support">Poor Customer Support</option>
            <option value="found-alternative">Found a Better Alternative</option>
            <option value="other">Other</option>
          </select>
                </div>
                <div class="mb-6" id="custom-reason-container" style="display: none;">
                    <label for="custom-reason" class="block text-gray-700 font-bold mb-2">Please specify</label>
                    <input type="text" id="custom-reason" name="custom-reason" class="w-full px-3 py-2 border rounded-lg">
                </div>
                <button type="submit" class="bg-primary text-white py-3 px-6 rounded-full">Submit</button>
            </form>
        </section>
    </div>
    <script>
        function toggleCustomReason() {
      const reasonSelect = document.getElementById('reason');
      const customReasonContainer = document.getElementById('custom-reason-container');
      if (reasonSelect.value === 'other') {
        customReasonContainer.style.display = 'block';
      } else {
        customReasonContainer.style.display = 'none';
      }
    }

    function handleSubmit(event) {
      event.preventDefault();
      alert("Your account deletion request is being processed. You will receive an email update soon.");
    }
    </script>
</body>

</html>
